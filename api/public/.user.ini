memory_limit = 512M
max_execution_time = 120
; Wearable ingestion batches carry GPS route polylines in raw_data; a batch of
; activities can run into a few MB. Bump above the 8M default so production
; (FPM, which reads this file) doesn't 413. Note: `php artisan serve` does NOT
; read .user.ini — local dev relies on the small client-side chunk size in
; workout_sync_provider.dart (_ingestChunkSize) to stay under the 8M default.
post_max_size = 32M
upload_max_filesize = 32M
